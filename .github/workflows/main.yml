name: Build itempack

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  NDK_VERSION: '26.3.11579264'
  ANDROID_PLATFORM: 'android-26'
  ABI: 'arm64-v8a'

jobs:
  build:
    name: Build ARM64 .so
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK via sdkmanager
        run: |
          set -e
          # Accept all licenses (sdkmanager requires explicit acceptance)
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          # Install NDK + platform as separate sdkmanager invocations to avoid
          # multi-line YAML quoting issues with setup-android's "packages" input.
          sdkmanager "ndk;${{ env.NDK_VERSION }}"
          sdkmanager "platforms;${{ env.ANDROID_PLATFORM }}"

      - name: Locate NDK
        id: ndk
        run: |
          NDK_PATH="$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}"
          echo "ndk_path=$NDK_PATH" >> $GITHUB_OUTPUT
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "NDK at: $NDK_PATH"
          ls "$NDK_PATH/build/cmake/android.toolchain.cmake"

      - name: Configure CMake
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk_path }}
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.ndk.outputs.ndk_path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ env.ABI }} \
            -DANDROID_PLATFORM=${{ env.ANDROID_PLATFORM }} \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SHARED_LINKER_FLAGS="-Wl,--gc-sections,--strip-all -s"

      - name: Build
        run: cmake --build build --config Release -j$(nproc)

      - name: Prepare artifact
        run: |
          mkdir -p artifact
          # Copy the main .so
          if [ -f build/libitempack.so ]; then
            cp build/libitempack.so artifact/
          fi
          # List what we have
          ls -la artifact/
          file artifact/*.so || true

      - name: Upload .so artifact
        uses: actions/upload-artifact@v4
        with:
          name: itempack-arm64-v8a
          path: artifact/
          retention-days: 30

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifact/*.so
          draft: false
          prerelease: false
          generate_release_notes: true
